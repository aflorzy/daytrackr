# Development profile configuration
server:
  port: ${SERVER_PORT:8082}

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/daytrackr?createDatabaseIfNotExist=true
    username: aflorzy
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mail:
    debug: true
  # Flyway specific settings for development
  flyway:
    # Set to false temporarily if you need to manually fix migrations during development
    clean-disabled: true
    # Uncomment to clean the database before migrations (CAUTION: removes all data!)
    # clean-on-validation-error: true

# Development-specific logging
logging:
  level:
    com.aflorzy.daytrackr: DEBUG
    org.springframework: INFO
    org.hibernate.SQL: DEBUG
    # Comment out the next line to see bind parameter values
    # org.hibernate.type.descriptor.sql: TRACE

# Actuator endpoints for development
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
