# Production profile configuration
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate  # More restrictive setting for production
    show-sql: false
  mail:
    debug: false

# Production-specific logging
logging:
  level:
    root: WARN
    com.aflorzy.daytrackr: INFO
    org.springframework: WARN

# Actuator endpoints for production (restricted for security)
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
