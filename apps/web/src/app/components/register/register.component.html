<div class="form-container">
  <h2>Register</h2>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="username">Username</label>

      <input type="text" id="username" formControlName="username" />

      <ng-container *ngIf="username.hasError('required') && username.touched">
        <div class="error-message">Username is required.</div>
      </ng-container>
    </div>

    <div class="form-group">
      <label for="password">Password</label>

      <input type="password" id="password" formControlName="password" />

      <ng-container *ngIf="password.hasError('required') && password.touched">
        <div class="error-message">Password is required.</div>
      </ng-container>

      <ng-container *ngIf="password.hasError('minlength') && password.touched">
        <div class="error-message">Password must be at least 6 characters long.</div>
      </ng-container>
    </div>

    <div class="form-group">
      <label for="confirmPassword">Confirm Password</label>

      <input type="password" id="confirmPassword" formControlName="confirmPassword" />

      <ng-container *ngIf="confirmPassword.hasError('required') && confirmPassword.touched">
        <div class="error-message">Confirm Password is required.</div>
      </ng-container>

      <ng-container *ngIf="(passwordsMatch$ | async) === false">
        <div class="error-message">Passwords do not match</div>
      </ng-container>
    </div>

    <app-button type="submit" [disabled]="!registerForm.valid || (passwordsMatch$ | async) === false"
      >Register</app-button
    >
  </form>

  <p class="auth-alt">Already have an account? <a routerLink="/login">Login Now</a></p>

  <ng-container *ngIf="responseMessage$ | async as responseMessage"
    ><app-banner
      [type]="responseMessage.statusType"
      [message]="responseMessage.message"
      [dismissable]="false"></app-banner
  ></ng-container>
</div>
