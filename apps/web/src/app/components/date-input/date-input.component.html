<input
  type="text"
  name="initialDate"
  id="initialDate"
  [(ngModel)]="initialDate"
  (input)="onChange()"
  autocomplete="off"
  placeholder="YYYY/MM/DD"
  [pattern]="regex"
/>
<p class="hint">
  <span [class.invalid]="invalidDate">{{
    invalidDate ? date : (date | date : "EEEE, MMMM d, y")
  }}</span>
</p>
