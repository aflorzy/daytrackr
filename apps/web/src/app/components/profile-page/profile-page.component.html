<!-- edit-profile.component.html -->
<form [formGroup]="userForm" (ngSubmit)="onSubmit()">
  <div class="form-group">
    <label for="firstName">First Name</label>
    <input type="text" id="firstName" formControlName="firstName" />
    <div *ngIf="userFormControls.firstName.hasError('required')" class="error-message">First Name is required.</div>
  </div>

  <div class="form-group">
    <label for="lastName">Last Name</label>
    <input type="text" id="lastName" formControlName="lastName" />
    <div *ngIf="userFormControls.lastName.hasError('required')" class="error-message">Last Name is required.</div>
  </div>

  <div class="form-group">
    <label for="preferredName">Preferred Name</label>
    <input type="text" id="preferredName" formControlName="preferredName" />
  </div>

  <div class="form-group">
    <label for="email">Email Address</label>
    <input type="email" id="email" formControlName="email" />
    <div *ngIf="userFormControls.email.hasError('required')" class="error-message">Email Address is required.</div>
    <div *ngIf="userFormControls.email.hasError('email')" class="error-message">Invalid Email Address.</div>
  </div>

  <div class="form-group">
    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" formControlName="phone" />
    <div *ngIf="userFormControls.phone.hasError('pattern')" class="error-message">Invalid Phone Number.</div>
  </div>

  <button type="submit" [disabled]="!userForm.valid">Save Changes</button>
</form>
