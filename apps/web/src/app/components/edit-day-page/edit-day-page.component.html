<ng-container *ngIf="day$ | async as day; else loading">
  <div class="form-container form-container__lg">
    <app-edit-day
      [day]="day"
      [isChanged]="!!(isChanged$ | async)"
      (saveEdits)="saveEdits()"
      (cancelEdits)="cancelEdit()"
      (moveEventUp)="moveEventUp($event)"
      (moveEventDown)="moveEventDown($event)"
      (moveEvent)="moveEvent($event)"
      (removeEvent)="removeEvent($event)"
      (addEvent)="addEvent($event)"></app-edit-day>
  </div>
</ng-container>

<ng-template #loading> Loading... </ng-template>
