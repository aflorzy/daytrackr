<nav class="desktop">
  <a class="logo" routerLink="/">
    <img src="favicon.ico" alt="Logo" />

    <h1>DayTrackr</h1>
  </a>

  <ul class="tabs" *ngIf="isAuthenticatedUser$ | async">
    <li class="tab">
      <a routerLink="/" routerLinkActive="active-item">Home</a>
    </li>

    <li class="tab">
      <a routerLink="/parser" routerLinkActive="active-item">Parser</a>
    </li>

    <li class="tab">
      <a routerLink="/contact" routerLinkActive="active-item">Contact</a>
    </li>

    <li class="tab">
      <a routerLink="/login" routerLinkActive="active-item" (click)="logout()">Logout</a>
    </li>

    <li class="tab user-icon">
      <a routerLink="/profile"><fa-icon [icon]="['fas', 'user-circle']"></fa-icon></a>
    </li>
  </ul>
</nav>
