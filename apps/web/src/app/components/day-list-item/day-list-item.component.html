<div class="content" *ngIf="day">
  <div class="date">{{ day.date | date : "EEEE, MMMM d, y" }}</div>
  <div class="events">
    <div class="event" *ngFor="let event of day.events; let i = index">
      <span
        class="name"
        [contentEditable]="editable"
        (focus)="focusCell(i)"
        (input)="editEvent($event)"
        (keydown.Enter)="submit($event, i)"
        (blur)="submit($event, i)"
        [innerHTML]="event.name"
      ></span>
      <span
        class="gap"
        [class.hidden]="!editable"
        *ngIf="i !== day.events.length - 1"
        (click)="combineEvents(i)"
      >
        <fa-icon [icon]="faArrowsLeftRightToLine"></fa-icon>
      </span>
    </div>
  </div>
</div>
