@if (day) {
  <h2>{{ day.date | date: "mediumDate" }}</h2>

  <div class="events" cdkDropList>
    @for (event of day.events; track event.idx) {
      <div class="event" cdkDrag (cdkDragDropped)="moveEvent.emit({ event, newIdx: $event.currentIndex })">
        <span class="index">{{ event.idx + 1 }}</span>

        <span class="arrow up" [class.hidden]="event.idx === 0" (click)="moveEventUp.emit(event)"
          ><fa-icon [icon]="['fas', 'chevron-up']"></fa-icon
        ></span>

        <span
          class="arrow down"
          [class.hidden]="event.idx === day.events.length - 1"
          (click)="moveEventDown.emit(event)"
          ><fa-icon [icon]="['fas', 'chevron-down']"></fa-icon
        ></span>

        <span class="trash-icon" (click)="removeEvent.emit(event)"
          ><fa-icon [icon]="['fas', 'trash']" transform="shrink-2"></fa-icon
        ></span>

        <span class="text">{{ event.name }}</span>
      </div>
    }
  </div>
} @else {
  <p>Loading...</p>
}

<form (submit)="addEvent.emit(eventForm.controls.eventInput.value || ''); eventForm.reset()" [formGroup]="eventForm">
  <app-button
    type="submit"
    size="sm"
    fill="fill"
    color="primary"
    [disabled]="!eventForm.get('eventInput')?.value?.trim()"
    >Add</app-button
  >

  <input type="text" placeholder="Add event..." autocomplete="off" formControlName="eventInput" />
</form>

<div class="button-group">
  <app-button (clicked)="saveEdits.emit()" fill="fill" color="primary" [disabled]="!isChanged">Save Changes</app-button>

  <app-button (clicked)="cancelEdits.emit(true)" fill="outline" color="primary">Cancel</app-button>
</div>
