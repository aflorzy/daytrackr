name: CI - Build and Push Docker Images

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main # Only PRs targeting main

jobs:
  validate_pr:
    name: Validate PR / Feature Branch
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for Nx to determine correct base
          filter: tree:0

      - name: Cache Nx workspace cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-v1-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('nx.json') }}-${{ hashFiles('**/project.json') }}
          restore-keys: |
            ${{ runner.os }}-nx-v1-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('nx.json') }}-${{ hashFiles('**/project.json') }}
            ${{ runner.os }}-nx-v1-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('nx.json') }}
            ${{ runner.os }}-nx-v1-${{ hashFiles('**/package-lock.json') }}
            ${{ runner.os }}-nx-v1-

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.0.2'
          # cache: 'npm' # We are now caching node_modules directly

      - name: Cache node_modules
        id: cache-node-modules-pr
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install Dependencies
        if: steps.cache-node-modules-pr.outputs.cache-hit != 'true'
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.6

      # Using the provided merge base for PR comparison
      - name: Lint Affected Projects (PR)
        run: npx nx affected --target=lint --parallel=3 --base=${{ github.event.pull_request.base.sha }} --head=${{ github.event.pull_request.head.sha }}

      - name: Build Affected Applications (PR)
        run: npx nx affected --target=build --configuration=production --base=${{ github.event.pull_request.base.sha }} --head=${{ github.event.pull_request.head.sha }}

  build_and_push_main:
    name: Build and Push Docker Images (Main Branch)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for Nx to determine correct base
          filter: tree:0

      - name: Cache Nx workspace cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: ${{ runner.os }}-nx-v1-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('nx.json') }}-${{ hashFiles('**/project.json') }}
          restore-keys: |
            ${{ runner.os }}-nx-v1-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('nx.json') }}-${{ hashFiles('**/project.json') }}
            ${{ runner.os }}-nx-v1-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('nx.json') }}
            ${{ runner.os }}-nx-v1-${{ hashFiles('**/package-lock.json') }}
            ${{ runner.os }}-nx-v1-

      - name: Extract short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.0.2'

      - name: Cache node_modules
        id: cache-node-modules-main
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install Dependencies
        if: steps.cache-node-modules-main.outputs.cache-hit != 'true'
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Maven
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: 3.9.6

      - name: Lint Affected Projects
        run: npx nx affected --target=lint --configuration=ci --base=${{ github.event.before }} --head=${{ github.sha }}

      - name: Build Affected Applications
        run: npx nx affected --target=build --configuration=production --base=HEAD~1 --head=HEAD

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v3
        with: 
          registry: ${{ vars.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      # Determine affected apps to conditionally build & push docker images
      - name: Get affected apps
        id: affected_apps
        run: |
          AFFECTED_PROJECTS=$(npx nx show projects --affected --with-target=build --base=HEAD~1 --head=HEAD | paste -sd, -)
          echo "Affected projects: ${AFFECTED_PROJECTS}"
          echo "apps=,${AFFECTED_PROJECTS}," >> $GITHUB_OUTPUT

      - name: Build and Push API Image if Affected
        if: contains(steps.affected_apps.outputs.apps, ',api,')
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ${{ vars.REGISTRY_URL }}/${{ github.repository }}/daytrackr-api:latest
            ${{ vars.REGISTRY_URL }}/${{ github.repository }}/daytrackr-api:${{ steps.vars.outputs.sha_short }}.${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push Web Image if Affected
        if: contains(steps.affected_apps.outputs.apps, ',web,')
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: |
            ${{ vars.REGISTRY_URL }}/${{ github.repository }}/daytrackr-web:latest
            ${{ vars.REGISTRY_URL }}/${{ github.repository }}/daytrackr-web:${{ steps.vars.outputs.sha_short }}.${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

